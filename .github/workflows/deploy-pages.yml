name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: true
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
      - run: node --test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: true
      - name: Assemble site (app files + pm5-base/lib)
        run: |
          mkdir -p _site/pm5-base
          cp index.html app.js slots.js style.css _site/
          cp -r pm5-base/lib _site/pm5-base/lib
      - uses: actions/upload-pages-artifact@v5.0.0

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
